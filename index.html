                        fontStyle: "italic",
                      }}
                    >
                      {f.memoire}
                    </div>
                  </div>
                  <div
                    style={{
                      fontSize: "11.5px",
                      color: textMuted,
                      whiteSpace: "nowrap",
                    }}
                  >
                    {f.date}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* Annotation Panel */}
      <AnnotationPanel
        section={activeSection}
        visible={!!activeSection}
        onClose={() => setActiveSection(null)}
      />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<CVTemplate />);

</script>
</body>
</html>
